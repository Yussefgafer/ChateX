name: ChateX Build & Release

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master", "main" ]

jobs:
  validation:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        timeout-minutes: 10
        run: ./gradlew testDebugUnitTest --info --stacktrace

  build:
    name: Build APK
    needs: validation
    runs-on: ubuntu-latest
    environment: KEYSTORE_BASE64
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "Decoding keystore..."
            echo "$KEYSTORE_BASE64" | base64 -d > chatex.jks
          else
            echo "KEYSTORE_BASE64 is empty. Skipping keystore decoding."
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || '01220950' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'chatex' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '01220950' }}

      - name: Get Version info
        id: version_info
        run: |
          VERSION_NAME=$(grep -m1 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Rename Release APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/ChateX-${{ steps.version_info.outputs.branch }}-${{ steps.version_info.outputs.version_name }}.apk || true
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/ChateX-${{ steps.version_info.outputs.branch }}-${{ steps.version_info.outputs.version_name }}-unsigned.apk || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ChateX-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ChateX-Release-APK
          path: app/build/outputs/apk/release/ChateX-*.apk
          retention-days: 7

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: ChateX-Release-APK

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: ChateX-Debug-APK
          path: debug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
          files: |
            ChateX-*.apk
            debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
