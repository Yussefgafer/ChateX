name: ChateX Spectral Build & Release

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master", "main" ]

jobs:
  validation:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --continue

  build:
    name: Build APK
    needs: validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      if: github.event_name != 'pull_request' && env.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: echo "$KEYSTORE_BASE64" | base64 -d > chatex.jks || true

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || '01220950' }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'chatex' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '01220950' }}

    - name: Get Version info
      id: version_info
      run: |
        VERSION_NAME=$(grep -m1 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "branch=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

    - name: Rename & Upload APKs
      if: github.event_name != 'pull_request'
      run: |
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/ChateX-${{ steps.version_info.outputs.branch }}-${{ steps.version_info.outputs.version_name }}.apk || true

    - name: Upload Release APK Artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: ChateX-Release-APK
        path: app/build/outputs/apk/release/ChateX-*.apk
        retention-days: 7

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ChateX-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: ChateX-Release-APK

    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: ChateX-Debug-APK
        path: debug

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        draft: true
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        generate_release_notes: true
        files: |
          ChateX-*.apk
          debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
